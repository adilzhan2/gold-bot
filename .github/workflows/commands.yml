name: gold-bot commands

# Лёгкий воркер команд: каждые 5 мин читает сообщения боту (/check, /last,
# /status, /week) и отвечает. Так "проверь сейчас" работает с задержкой ~5 мин.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: commands
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-actions.txt
      - name: Ответить на команды
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
        run: python -m scripts.respond
      - name: Сохранить состояние команд
        run: |
          if [[ -n "$(git status --porcelain state/)" ]]; then
            git config user.name "gold-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state/
            git commit -m "state: команды (offset/week)"
            git pull --rebase --autostash -q || true
            git push || true
          fi
