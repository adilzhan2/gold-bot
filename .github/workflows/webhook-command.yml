name: gold-bot webhook command

# Мгновенный отклик на команды: Cloudflare Worker ловит вебхук Telegram и
# дёргает этот workflow через repository_dispatch (event tg-command).
# Так /check отвечает за ~1 мин, без задержек cron.
on:
  repository_dispatch:
    types: [tg-command]

permissions:
  contents: read

jobs:
  cmd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-actions.txt
      - name: Выполнить команду
        env:
          CMD: ${{ github.event.client_payload.cmd }}   # через env (без shell-инъекции)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
        run: python -m scripts.handle_command "$CMD"
